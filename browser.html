<html>
    <head>
        <style>
            h1, #leclick, #bruh{
                font-weight: 400;
                text-align: center;
                font-family: Verdana;
            }
            #answer{
                font-weight: 700;
                color: #859900;
            }
            body{
                background-color: #fdf6e3;
            }
        </style>
    </head>
    <body>
        <h1>Your browser is <span id="answer"></span></h1>
        <p id="leclick" onclick="cliko()">Click here to find out why I think that your browser is <span id="answer2"></span></p>
        <p id="bruh" onclick="bruhh()">Click for technical browser data</p>
    </body>
    <script>
        BROWSER = ""
        brands = navigator?.userAgentData?.brands
        if(navigator.userAgent.includes("Firefox")) BROWSER = "Firefox"
        else if(navigator.userAgent.includes("FBIOS")) BROWSER = "Facebook's Browser"
        else if(navigator.userAgent.includes("Snapchat")) BROWSER = "Snapchat's Browser"
        else if(navigator.oscpu != undefined) BROWSER = "Tor"
        else if(navigator.brave && (navigator.brave.isBrave() || false)) BROWSER = "Brave"
        else if(navigator.userAgentData == undefined && navigator.appVersion.includes("Version")) BROWSER = "Safari"
        else if(navigator.userAgent.includes("Edg")) BROWSER = "Edge"
        else if(navigator.userAgentData == undefined || +navigator?.userAgentData?.brands.filter(x => x.brand.includes("Not"))[0].version != 99) BROWSER = "Vivaldi"
        else if(navigator.userAgent.includes("Opera") || navigator.userAgent.includes("OPR"))  BROWSER = "Opera"
        else BROWSER = "Chrome"
        answer2.innerHTML = answer.innerHTML = BROWSER
        //



        function cliko(){
            leclick.innerHTML = {
                "Firefox": "The navigator's user agent has the word \"Firefox\" in it",
                "Facebook's Browser": "The navigator's user agent has the 'word' \"FBIOS\" in it",
                "Snapchat's Browser": "The navigator's user agent has the word \"Snapchat\" in it",
                "Tor": "The browser is keeping track of your operating system (navigator.oscpu)",
                "Brave": "There are brave functions built into the navigator",
                "Safari": "The userAgentData isn't defined and your app version includes the word \"Version\"",
                "Edge": "Your browser's user agent includes the 'word' \"Edg\"",
                "Vivaldi": "The userAgentData isn't defined and the user agent's \"Not-A-Brand\" identity does not have a value of 99",
                "Opera": "Your browser's user agent includes the 'word' \"OPR\" or the word \"Opera\"",
                "Chrome": "Your browser wasn't identified as anything else so it is being shown as Chrome... I'll work on this, the website is only a few hours old",
            }[BROWSER]
        }
        function bruhh(){
            for(var property in navigator){ 
                var str = navigator[property]
                bruh.innerHTML += (property+ "&nbsp;&nbsp;<em>"+str+"</em><br />");
            }
        }
    </script>
</html>
